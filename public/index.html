<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM BIOS Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap&subset=cyrillic" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border: 2px solid #0f0;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            background: rgba(0,0,0,0.9);
        }
        h1 { text-align: center; font-size: 16px; margin-bottom: 30px; line-height: 2; letter-spacing: 2px; }
        .online { text-align: center; font-size: 10px; color: #0f0; margin-top: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 10px; margin-top: 15px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 12px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus { outline: none; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
        button {
            width: 100%;
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #00cc00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        .rules {
            margin-top: 20px;
            font-size: 9px;
            color: #666;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
            line-height: 2;
        }
        .rules span { color: #ff0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>╔═══════════════════════╗<br>║  IBM BIOS CHAT v3.0 ║<br>╚═══════════════════════╝</h1>
        <div class="online">🌐 Публичный чат</div>
        <br>

        <form action="/login" method="POST">
            <label>👤 ВВЕДИТЕ ВАШ НИКНЕЙМ:</label>
            <input type="text" name="nick" required placeholder="Neo" maxlength="20">

            <label>🔑 ПАРОЛЬ:</label>
            <input type="password" name="password" required placeholder="Придумайте пароль">

            <input type="hidden" name="deviceId" id="deviceId">

            <button type="submit">ВОЙТИ / ЗАРЕГИСТРИРОВАТЬСЯ</button>
        </form>

        <div class="rules">
            <span>⚠️</span> Ник: 2-20 символов<br>
            <span>🚫</span> Запрещены ссылки, мат, спам<br>
            <span>⏳</span> 5 сек между сообщениями
        </div>
    </div>

    <script>
        let deviceId = localStorage.getItem('deviceId');
        if (!deviceId) {
            deviceId = 'dev-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('deviceId', deviceId);
        }
        document.getElementById('deviceId').value = deviceId;
    </script>
</body>
</html>
