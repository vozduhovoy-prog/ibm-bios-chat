<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM BIOS Chat</title>
    <style>
        @font-face {
            font-family: 'Mx437';
            src: url('/fonts/Mx437_IBM_BIOS.ttf') format('truetype');
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Mx437', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border: 2px solid #0f0;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
            letter-spacing: 3px;
            line-height: 2;
        }
        .online {
            color: #0f0;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
        input[type="text"] {
            width: 100%;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 12px;
            font-family: 'Mx437', 'Courier New', monospace;
            font-size: 18px;
            margin-bottom: 15px;
        }
        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        button {
            width: 100%;
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px;
            font-family: 'Mx437', 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #00cc00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        .rules {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
            line-height: 2;
        }
        .rules span {
            color: #ff0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>╔═══════════════════════╗<br>║  IBM BIOS CHAT v3.0 ║<br>╚═══════════════════════╝</h1>
        <div class="online">🌐 Публичный чат</div>
        <br>
        <form action="/login" method="POST">
            <label>👤 ВВЕДИТЕ ВАШ НИКНЕЙМ:</label>
            <input type="text" name="nick" required placeholder="Neo" maxlength="20">
            <button type="submit">ВОЙТИ В ЧАТ</button>
        </form>
        <div class="rules">
            <span>⚠️</span> Ник: 2-20 символов<br>
            <span>🚫</span> Запрещены ссылки, мат, спам<br>
            <span>⏳</span> 5 сек между сообщениями
        </div>
    </div>
</body>
</html>
